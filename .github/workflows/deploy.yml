name: Microservices CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Docker login
      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3️⃣ Build & Push API Gateway
      - name: Build API Gateway
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/api-gateway ./services/api-gateway
          docker push ${{ secrets.DOCKER_USERNAME }}/api-gateway

      # 4️⃣ Build & Push Product Service
      - name: Build Product Service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/product-service ./services/product-service
          docker push ${{ secrets.DOCKER_USERNAME }}/product-service

      # 5️⃣ Build & Push AI Service
      - name: Build AI Service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ai-service ./services/ai-service
          docker push ${{ secrets.DOCKER_USERNAME }}/ai-service

      # 6️⃣ Deploy on EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/ai-product-analyzer

            docker-compose down

            docker pull ${{ secrets.DOCKER_USERNAME }}/api-gateway
            docker pull ${{ secrets.DOCKER_USERNAME }}/product-service
            docker pull ${{ secrets.DOCKER_USERNAME }}/ai-service

            docker-compose up -d