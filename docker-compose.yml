version: "3.9"

services:
  api-gateway:
    image: dattavenkataramana/api-gateway:latest
    ports:
      - "5000:5000"
    depends_on:
      - product-service
      - ai-service

  product-service:
    image: dattavenkataramana/product-service:latest

  ai-service:
    image: dattavenkataramana/ai-service:latest

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"