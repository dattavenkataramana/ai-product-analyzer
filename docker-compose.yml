version: "3.9"

services:
  api-gateway:
    build: ./services/api-gateway
    ports:
      - "5000:5000"

  product-service:
    build: ./services/product-service

  ai-service:
    build: ./services/ai-service

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"