#D:\ai-product-analyzer\prometheus.yml
global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "api"
    static_configs:
      - targets: ["api-gateway:5000"]

  - job_name: "product"
    static_configs:
      - targets: ["product-service:5000"]

  - job_name: "ai"
    static_configs:
      - targets: ["ai-service:5000"]